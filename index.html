<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaApp - Pro Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            background-color: #f7f7f7;
            color: #3c3c3c;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background-color: #ffffff;
            border-right: 2px solid #e5e5e5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .logo {
            color: #58cc02;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .user-card {
            background-color: #f0f9ff;
            border: 2px solid #84d8ff;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-name {
            font-weight: 800;
            color: #1cb0f6;
            font-size: 16px;
        }

        .edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-btn {
            width: 100%;
            text-align: left;
            background: none;
            border: 2px solid transparent;
            color: #777;
            font-weight: 700;
            font-size: 15px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn.active, .nav-btn:hover {
            background-color: #ddf4ff;
            color: #1cb0f6;
            border-color: #84d8ff;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar {
            width: 100%;
            max-width: 750px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e5e5e5;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            font-size: 18px;
            font-weight: 800;
        }

        /* App Container */
        .app-container {
            width: 100%;
            max-width: 720px;
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 0 #e5e5e5;
        }

        /* Difficulty Selectors */
        .difficulty-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .diff-card {
            border: 2px solid #e5e5e5;
            border-radius: 14px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .diff-card.active {
            border-color: #58cc02;
            background-color: #f2fbe8;
        }

        .diff-card.locked {
            background-color: #f9f9f9;
            opacity: 0.8;
        }

        .diff-title {
            font-size: 14px;
            font-weight: 800;
        }

        .diff-price {
            font-size: 12px;
            color: #1cb0f6;
            font-weight: 700;
            margin-top: 4px;
        }

        /* Question Box */
        .question-box {
            text-align: center;
            margin-bottom: 25px;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .speaker-btn {
            background: #1cb0f6;
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1899d6;
            margin-bottom: 10px;
        }

        .speaker-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1899d6;
        }

        .question-text {
            font-size: 24px;
            font-weight: 700;
            color: #3c3c3c;
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-card {
            border: 2px solid #e5e5e5;
            border-bottom: 4px solid #e5e5e5;
            border-radius: 15px;
            padding: 16px 10px;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
            background: white;
            color: #4b4b4b;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-card:hover {
            background-color: #f7f7f7;
        }

        .option-card.selected {
            border-color: #84d8ff;
            background-color: #ddf4ff;
            color: #1cb0f6;
        }

        /* Action Buttons */
        .action-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background-color: #58cc02;
            color: white;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #46a302;
            cursor: pointer;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #46a302;
        }

        .action-btn:disabled {
            background-color: #e5e5e5;
            color: #afafaf;
            box-shadow: none;
            cursor: not-allowed;
        }

        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            font-weight: 800;
            text-align: center;
            display: none;
        }

        .feedback.correct {
            display: block;
            background-color: #d7ffb8;
            color: #58cc02;
        }

        .feedback.wrong {
            display: block;
            background-color: #ffdfe0;
            color: #ff4b4b;
        }

        /* Leaderboard Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 0 #ccc;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e5e5e5;
            font-size: 15px;
        }

        .leaderboard-table th {
            color: #777;
        }

        .close-btn {
            background: #ff4b4b;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            font-weight: 800;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div>
            <h1 class="logo">duolingo</h1>
            
            <div class="user-card">
                <div>
                    <div style="font-size: 11px; color: #777;">FOYDALANUVCHI:</div>
                    <div class="user-name" id="user-display-name">Foydalanuvchi</div>
                </div>
                <button class="edit-btn" onclick="changeName()">✏️</button>
            </div>

            <ul class="nav-list">
                <li class="nav-item">
                    <button class="nav-btn active" id="btn-mode-words" onclick="switchCategory('words')">🔤 So'zlar Bo'limi</button>
                </li>
                <li class="nav-item">
                    <button class="nav-btn" id="btn-mode-sentences" onclick="switchCategory('sentences')">💬 Gaplar Bo'limi</button>
                </li>
                <li class="nav-item">
                    <button class="nav-btn" onclick="openLeaderboard()">🏆 Reyting Jadvali</button>
                </li>
            </ul>
        </div>
    </aside>

    <!-- Main Section -->
    <main class="main-content">
        <header class="top-bar">
            <h2 id="section-title">Oson Daraja - So'zlar</h2>
            <div class="stats">
                <span class="stat-item" style="color: #ff9600;">🔥 <span id="streak">0</span></span>
                <span class="stat-item" style="color: #1cb0f6;">💎 <span id="gems">0</span></span>
            </div>
        </header>

        <div class="app-container">
            <!-- Difficulty Selector -->
            <div class="difficulty-selector">
                <div class="diff-card active" id="diff-easy" onclick="selectDifficulty('easy')">
                    <div class="diff-title">🟢 Oson</div>
                    <div class="diff-price">Ochiq</div>
                </div>
                <div class="diff-card locked" id="diff-medium" onclick="selectDifficulty('medium')">
                    <div class="diff-title">🟡 O'rtacha</div>
                    <div class="diff-price" id="medium-status">🔒 1000 💎</div>
                </div>
                <div class="diff-card locked" id="diff-hard" onclick="selectDifficulty('hard')">
                    <div class="diff-title">🔴 Qiyin</div>
                    <div class="diff-price" id="hard-status">🔒 5000 💎</div>
                </div>
            </div>

            <div class="question-box">
                <button class="speaker-btn" onclick="speakCurrentText()">🔊</button>
                <div class="question-text" id="question-text">---</div>
            </div>

            <div class="options-grid" id="options-container">
                <!-- Options injected dynamically -->
            </div>

            <button class="action-btn" id="check-btn" onclick="checkAnswer()" disabled>TEKSHIRISH</button>

            <div class="feedback" id="feedback-box"></div>
        </div>
    </main>

    <!-- Leaderboard Modal -->
    <div class="modal" id="leaderboard-modal">
        <div class="modal-content">
            <h2>🏆 Umumiy Reyting</h2>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Ism</th>
                        <th>🔥 Streak</th>
                        <th>💎 Olmos</th>
                        <th>✅ To'g'ri</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <!-- Dynamic -->
                </tbody>
            </table>
            <button class="close-btn" onclick="closeLeaderboard()">YOPISH</button>
        </div>
    </div>

    <script>
        // Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(160, audioCtx.currentTime);
                osc.frequency.setValueAtTime(110, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(420, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        // DATABASE: WORDS & SENTENCES FOR EASY, MEDIUM, HARD
        const database = {
            easy: {
                words: [
                    { en: "Apple", uz: "Olma" }, { en: "Water", uz: "Suv" }, { en: "Book", uz: "Kitob" },
                    { en: "Cat", uz: "Mushuk" }, { en: "Dog", uz: "It" }, { en: "Sun", uz: "Quyosh" },
                    { en: "Moon", uz: "Oy" }, { en: "Bread", uz: "Non" }, { en: "Friend", uz: "Do'st" },
                    { en: "House", uz: "Uy" }, { en: "Car", uz: "Mashina" }, { en: "Pen", uz: "Ruchka" },
                    { en: "Tree", uz: "Daraxt" }, { en: "Milk", uz: "Sut" }, { en: "Door", uz: "Eshik" }
                ],
                sentences: [
                    { en: "Hello, how are you?", uz: "Salom, qalaysiz?" },
                    { en: "What is your name?", uz: "Ismingiz nima?" },
                    { en: "I love learning English.", uz: "Men ingliz tilini o'rganishni yaxshi ko'raman." },
                    { en: "Good morning!", uz: "Xayrli tong!" },
                    { en: "Have a nice day!", uz: "Kuningiz xayrli o'tsin!" },
                    { en: "This is my house.", uz: "Bu mening uyim." }
                ]
            },
            medium: {
                words: [
                    { en: "Knowledge", uz: "Bilim" }, { en: "Environment", uz: "Atrof-muhit" },
                    { en: "Opportunity", uz: "Imkoniyat" }, { en: "Development", uz: "Rivojlanish" },
                    { en: "Challenge", uz: "Sinov / Qiyinchilik" }, { en: "Behavior", uz: "Xulq-atvor" },
                    { en: "Experience", uz: "Tajriba" }, { en: "Government", uz: "Hukumat" },
                    { en: "Society", uz: "Jamiyat" }, { en: "Solution", uz: "Yechim" }
                ],
                sentences: [
                    { en: "Where is the nearest bank?", uz: "Eng yaqin bank qayerda?" },
                    { en: "I understand you very well.", uz: "Men sizni juda yaxshi tushunyapman." },
                    { en: "How much does this item cost?", uz: "Bu buyum qancha turadi?" },
                    { en: "Practice makes perfect.", uz: "Amaliyot mukammallikka yetaklaydi." },
                    { en: "Education is the key to success.", uz: "Ta'lim - muvaffaqiyat kalitidir." }
                ]
            },
            hard: {
                words: [
                    { en: "Perseverance", uz: "Matonat / Qat'iyat" }, { en: "Ubiquitous", uz: "Hamma yerda mavjud" },
                    { en: "Meticulous", uz: "Juda qunt bilan ishlaydigan" }, { en: "Ambiguity", uz: "Mavhumlik / Ikki ma'nolilik" },
                    { en: "Procrastination", uz: "Ishni keyinga surish" }, { en: "Resilience", uz: "Egilmaslik / Bosh egmaslik" },
                    { en: "Entrepreneurship", uz: "Tadbirkorlik" }, { en: "Cognitive", uz: "Aqliy / Bilingvistik" }
                ],
                sentences: [
                    { en: "The implementation of new policies requires extensive analysis.", uz: "Yangi siyosatni amalga oshirish keng qamrovli tahlilni talab qiladi." },
                    { en: "Notwithstanding the obstacles, we achieved remarkable success.", uz: "To'siqlarga qaramay, biz sezilarli muvaffaqiyatga erishdik." },
                    { en: "Artificial intelligence is reshaping the future of modern global economy.", uz: "Sun'iy intellekt zamonaviy global iqtisodiyot kelajagini qayta shakllantirmoqda." },
                    { en: "Continuous self-improvement leads to long-term professional fulfillment.", uz: "Uzluksiz o'z ustida ishlash uzoq muddatli kasbiy kamolotga olib keladi." }
                ]
            }
        };

        // USER STATE
        let userData = {
            name: "Foydalanuvchi",
            gems: 0,
            streak: 0,
            correctAnswers: 0,
            unlockedMedium: false,
            unlockedHard: false
        };

        let currentCategory = 'words'; // words or sentences
        let currentDifficulty = 'easy'; // easy, medium, hard
        let currentIndex = 0;
        let selectedOptionIndex = null;
        let generatedOptions = [];

        function initData() {
            const saved = localStorage.getItem('duolingo_pro_user');
            if (saved) {
                userData = JSON.parse(saved);
            } else {
                let pName = prompt("Ismingizni kiriting:", "O'quvchi");
                if (pName) userData.name = pName.trim();
                saveData();
            }
            updateUI();
        }

        function saveData() {
            localStorage.setItem('duolingo_pro_user', JSON.stringify(userData));
            updateLeaderboardStorage();
        }

        function changeName() {
            let pName = prompt("Yangi ismingizni kiriting:", userData.name);
            if (pName && pName.trim() !== "") {
                userData.name = pName.trim();
                saveData();
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('user-display-name').innerText = userData.name;
            document.getElementById('gems').innerText = userData.gems;
            document.getElementById('streak').innerText = userData.streak;

            // Medium status
            const medStat = document.getElementById('medium-status');
            if (userData.unlockedMedium) {
                medStat.innerText = "Ochiq";
                document.getElementById('diff-medium').classList.remove('locked');
            } else {
                medStat.innerText = "🔒 1000 💎";
                document.getElementById('diff-medium').classList.add('locked');
            }

            // Hard status
            const hardStat = document.getElementById('hard-status');
            if (userData.unlockedHard) {
                hardStat.innerText = "Ochiq";
                document.getElementById('diff-hard').classList.remove('locked');
            } else {
                hardStat.innerText = "🔒 5000 💎";
                document.getElementById('diff-hard').classList.add('locked');
            }

            // Highlight Active Diff
            document.querySelectorAll('.diff-card').forEach(el => el.classList.remove('active'));
            document.getElementById(`diff-${currentDifficulty}`).classList.add('active');

            // Header Title
            const diffNames = { easy: "Oson", medium: "O'rtacha", hard: "Qiyin" };
            const catNames = { words: "So'zlar", sentences: "Gaplar" };
            document.getElementById('section-title').innerText = `${diffNames[currentDifficulty]} Daraja - ${catNames[currentCategory]}`;
        }

        function selectDifficulty(diff) {
            playSound('click');
            if (diff === 'medium' && !userData.unlockedMedium) {
                if (userData.gems >= 1000) {
                    if (confirm("O'rtacha darajani 1000 olmosga sotib olasizmi?")) {
                        userData.gems -= 1000;
                        userData.unlockedMedium = true;
                        saveData();
                    } else return;
                } else {
                    alert("O'rtacha darajani ochish uchun sizga 1000 olmos kerak!");
                    return;
                }
            }

            if (diff === 'hard' && !userData.unlockedHard) {
                if (userData.gems >= 5000) {
                    if (confirm("Qiyin darajani 5000 olmosga sotib olasizmi?")) {
                        userData.gems -= 5000;
                        userData.unlockedHard = true;
                        saveData();
                    } else return;
                } else {
                    alert("Qiyin darajani ochish uchun sizga 5000 olmos kerak!");
                    return;
                }
            }

            currentDifficulty = diff;
            currentIndex = 0;
            updateUI();
            loadQuestion();
        }

        function switchCategory(cat) {
            playSound('click');
            currentCategory = cat;
            currentIndex = 0;

            document.getElementById('btn-mode-words').classList.toggle('active', cat === 'words');
            document.getElementById('btn-mode-sentences').classList.toggle('active', cat === 'sentences');

            updateUI();
            loadQuestion();
        }

        function getCurrentList() {
            return database[currentDifficulty][currentCategory];
        }

        function generateOptions(correctAnswer) {
            const list = getCurrentList();
            let options = [correctAnswer];
            
            // Collect distractors from all levels
            let allDistractors = [];
            Object.keys(database).forEach(d => {
                database[d][currentCategory].forEach(item => {
                    if (item.uz !== correctAnswer && !options.includes(item.uz)) {
                        allDistractors.push(item.uz);
                    }
                });
            });

            allDistractors.sort(() => Math.random() - 0.5);

            while (options.length < 4 && allDistractors.length > 0) {
                options.push(allDistractors.pop());
            }

            return options.sort(() => Math.random() - 0.5);
        }

        function loadQuestion() {
            const list = getCurrentList();
            if (currentIndex >= list.length) currentIndex = 0;

            const currentItem = list[currentIndex];
            document.getElementById('question-text').innerText = `"${currentItem.en}"`;

            generatedOptions = generateOptions(currentItem.uz);
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            selectedOptionIndex = null;
            document.getElementById('check-btn').disabled = true;
            document.getElementById('check-btn').innerText = "TEKSHIRISH";
            document.getElementById('feedback-box').className = "feedback";

            generatedOptions.forEach((optText, idx) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerText = optText;
                card.onclick = () => selectOption(idx, card);
                container.appendChild(card);
            });

            speakText(currentItem.en);
        }

        function speakCurrentText() {
            playSound('click');
            const list = getCurrentList();
            speakText(list[currentIndex].en);
        }

        function selectOption(idx, element) {
            playSound('click');
            selectedOptionIndex = idx;
            document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('check-btn').disabled = false;
        }

        function checkAnswer() {
            const btn = document.getElementById('check-btn');
            const feedback = document.getElementById('feedback-box');
            const list = getCurrentList();

            if (btn.innerText === "DAVOM ETISH") {
                currentIndex = (currentIndex + 1) % list.length;
                loadQuestion();
                return;
            }

            const currentItem = list[currentIndex];

            if (generatedOptions[selectedOptionIndex] === currentItem.uz) {
                playSound('correct');
                feedback.innerText = "To'g'ri javob! Ajoyib! 🎉";
                feedback.className = "feedback correct";

                // Reward Calculation
                let rewardGems = 10;
                if (currentDifficulty === 'medium') rewardGems = 25;
                if (currentDifficulty === 'hard') rewardGems = 60;
                if (currentCategory === 'sentences') rewardGems *= 2; // Sentences give double reward!

                userData.gems += rewardGems;
                userData.streak += 1;
                userData.correctAnswers += 1;
                saveData();
                updateUI();
            } else {
                playSound('wrong');
                feedback.innerText = `Noto'g'ri! To'g'ri javob: "${currentItem.uz}"`;
                feedback.className = "feedback wrong";
                userData.streak = 0; // Reset streak on mistake
                saveData();
                updateUI();
            }

            btn.innerText = "DAVOM ETISH";
        }

        // LEADERBOARD LOGIC
        function updateLeaderboardStorage() {
            let board = JSON.parse(localStorage.getItem('duolingo_pro_board') || "[]");
            let found = board.find(u => u.name === userData.name);
            if (found) {
                found.gems = userData.gems;
                found.streak = userData.streak;
                found.correctAnswers = userData.correctAnswers;
            } else {
                board.push({
                    name: userData.name,
                    gems: userData.gems,
                    streak: userData.streak,
                    correctAnswers: userData.correctAnswers
                });
            }
            
            // Demo bot players if leaderboard is small
            if (board.length < 3) {
                board.push({ name: "Jasur_Pro", gems: 1200, streak: 12, correctAnswers: 45 });
                board.push({ name: "Malika_En", gems: 3400, streak: 25, correctAnswers: 110 });
            }

            board.sort((a, b) => b.gems - a.gems);
            localStorage.setItem('duolingo_pro_board', JSON.stringify(board));
        }

        function openLeaderboard() {
            playSound('click');
            updateLeaderboardStorage();
            let board = JSON.parse(localStorage.getItem('duolingo_pro_board') || "[]");
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            board.forEach((user, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${index + 1}</b></td>
                    <td>${user.name}</td>
                    <td>🔥 ${user.streak}</td>
                    <td>💎 ${user.gems}</td>
                    <td>✅ ${user.correctAnswers}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('leaderboard-modal').style.display = 'flex';
        }

        function closeLeaderboard() {
            playSound('click');
            document.getElementById('leaderboard-modal').style.display = 'none';
        }

        window.onload = () => {
            initData();
            loadQuestion();
        };
    </script>
</body>
</html>
