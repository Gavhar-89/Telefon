<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaApp - Katta Lug'at va Gaplar Baza Versiyasi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            background-color: #f7f7f7;
            color: #3c3c3c;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background-color: #ffffff;
            border-right: 2px solid #e5e5e5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .logo {
            color: #58cc02;
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 10px;
        }

        .nav-btn {
            width: 100%;
            text-align: left;
            background: none;
            border: 2px solid transparent;
            color: #777;
            font-weight: 700;
            font-size: 16px;
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn.active, .nav-btn:hover {
            background-color: #ddf4ff;
            color: #1cb0f6;
            border-color: #84d8ff;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e5e5e5;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            font-size: 18px;
            font-weight: 800;
        }

        /* Container */
        .app-container {
            width: 100%;
            max-width: 680px;
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 0 #e5e5e5;
        }

        .mode-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .mode-title {
            font-size: 13px;
            color: #afafaf;
            font-weight: 800;
            text-transform: uppercase;
        }

        .progress-counter {
            font-size: 14px;
            font-weight: 700;
            color: #1cb0f6;
        }

        .question-box {
            text-align: center;
            margin-bottom: 25px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .speaker-btn {
            background: #1cb0f6;
            border: none;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1899d6;
            margin-bottom: 12px;
            transition: transform 0.1s;
        }

        .speaker-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1899d6;
        }

        .question-text {
            font-size: 26px;
            font-weight: 700;
            color: #3c3c3c;
            line-height: 1.3;
        }

        /* Options */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-card {
            border: 2px solid #e5e5e5;
            border-bottom: 4px solid #e5e5e5;
            border-radius: 15px;
            padding: 16px 12px;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
            background: white;
            color: #4b4b4b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

        .option-card:hover {
            background-color: #f7f7f7;
        }

        .option-card.selected {
            border-color: #84d8ff;
            background-color: #ddf4ff;
            color: #1cb0f6;
        }

        /* Action Button */
        .action-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background-color: #58cc02;
            color: white;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #46a302;
            cursor: pointer;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #46a302;
        }

        .action-btn:disabled {
            background-color: #e5e5e5;
            color: #afafaf;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Feedback */
        .feedback {
            margin-top: 15px;
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            text-align: center;
            display: none;
            font-size: 16px;
        }

        .feedback.correct {
            display: block;
            background-color: #d7ffb8;
            color: #58cc02;
        }

        .feedback.wrong {
            display: block;
            background-color: #ffdfe0;
            color: #ff4b4b;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div>
            <h1 class="logo">duolingo</h1>
            <ul class="nav-list">
                <li class="nav-item">
                    <button class="nav-btn active" id="mode-words-btn" onclick="switchMode('words')">🔤 So'zlar Bo'limi (50+)</button>
                </li>
                <li class="nav-item">
                    <button class="nav-btn" id="mode-sentences-btn" onclick="switchMode('sentences')">💬 Gaplar Bo'limi (30+)</button>
                </li>
            </ul>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <h2 id="section-title">So'zlar Bazasidan Mashq</h2>
            <div class="stats">
                <span class="stat-item" style="color: #ff9600;">🔥 <span id="streak">1</span></span>
                <span class="stat-item" style="color: #1cb0f6;">💎 <span id="gems">100</span></span>
            </div>
        </header>

        <div class="app-container">
            <div class="mode-header">
                <div class="mode-title" id="mode-label">BO'LIM: SO'ZLAR</div>
                <div class="progress-counter" id="progress-text">1 / 50</div>
            </div>
            
            <div class="question-box">
                <button class="speaker-btn" onclick="speakCurrentText()">🔊</button>
                <div class="question-text" id="question-text">---</div>
            </div>

            <div class="options-grid" id="options-container">
                <!-- Dynamic Options -->
            </div>

            <button class="action-btn" id="check-btn" onclick="checkAnswer()" disabled>TEKSHIRISH</button>

            <div class="feedback" id="feedback-box"></div>
        </div>
    </main>

    <script>
        // Web Audio API Sound Effects
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(160, audioCtx.currentTime);
                osc.frequency.setValueAtTime(110, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(420, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        // Text-to-Speech
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        // KATTA SO'ZLAR BAZASI (50+ so'zlar)
        const wordsDatabase = [
            { en: "Apple", uz: "Olma" },
            { en: "Water", uz: "Suv" },
            { en: "Book", uz: "Kitob" },
            { en: "Cat", uz: "Mushuk" },
            { en: "Dog", uz: "It" },
            { en: "Sun", uz: "Quyosh" },
            { en: "Moon", uz: "Oy" },
            { en: "Bread", uz: "Non" },
            { en: "Friend", uz: "Do'st" },
            { en: "School", uz: "Maktab" },
            { en: "Teacher", uz: "O'qituvchi" },
            { en: "Student", uz: "O'quvchi / Talaba" },
            { en: "House", uz: "Uy" },
            { en: "Car", uz: "Mashina" },
            { en: "City", uz: "Shahar" },
            { en: "Tree", uz: "Daraxt" },
            { en: "Computer", uz: "Kompyuter" },
            { en: "Phone", uz: "Telefon" },
            { en: "Pen", uz: "Ruchka" },
            { en: "Milk", uz: "Sut" },
            { en: "Family", uz: "Oila" },
            { en: "Mother", uz: "Ona" },
            { en: "Father", uz: "Ota" },
            { en: "Brother", uz: "Aka / Uka" },
            { en: "Sister", uz: "Opa / Singil" },
            { en: "Time", uz: "Vaqt" },
            { en: "Day", uz: "Kun" },
            { en: "Night", uz: "Tun" },
            { en: "Morning", uz: "Ertalab" },
            { en: "Evening", uz: "Kechqurun" },
            { en: "Window", uz: "Oyna / Deraza" },
            { en: "Door", uz: "Eshik" },
            { en: "Table", uz: "Stol" },
            { en: "Chair", uz: "Stul" },
            { en: "Food", uz: "Ovqat" },
            { en: "Tea", uz: "Choy" },
            { en: "Coffee", uz: "Kofe" },
            { en: "Rain", uz: "Yomg'ir" },
            { en: "Snow", uz: "Qor" },
            { en: "Fire", uz: "Olov" },
            { en: "Earth", uz: "Yer" },
            { en: "Sky", uz: "Osmon" },
            { en: "Flower", uz: "Gul" },
            { en: "Road", uz: "Yo'l" },
            { en: "Bridge", uz: "Ko'prik" },
            { en: "Money", uz: "Pul" },
            { en: "Job", uz: "Ish / Kasb" },
            { en: "Music", uz: "Musiqa" },
            { en: "Key", uz: "Kalit" },
            { en: "Bag", uz: "Ssumka / Sumka" }
        ];

        // KATTA GAPLAR BAZASI (30+ gaplar)
        const sentencesDatabase = [
            { en: "Hello, how are you?", uz: "Salom, qalaysiz?" },
            { en: "What is your name?", uz: "Ismingiz nima?" },
            { en: "I love learning English.", uz: "Men ingliz tilini o'rganishni yaxshi ko'raman." },
            { en: "Where do you live?", uz: "Siz qayerda yashaysiz?" },
            { en: "Nice to meet you.", uz: "Tanishganimdan xursandman." },
            { en: "I need some water.", uz: "Menga biroz suv kerak." },
            { en: "Have a nice day!", uz: "Kuningiz xayrli o'tsin!" },
            { en: "See you tomorrow.", uz: "Ertagacha ko'rishguncha." },
            { en: "This book is very interesting.", uz: "Bu kitob juda qiziq." },
            { en: "Can you help me?", uz: "Menga yordam bera olasizmi?" },
            { en: "I am going home.", uz: "Men uyga ketyapman." },
            { en: "What time is it?", uz: "Soat necha bo'ldi?" },
            { en: "Where is the nearest bank?", uz: "Eng yaqin bank qayerda?" },
            { en: "I understand you very well.", uz: "Men sizni juda yaxshi tushunyapman." },
            { en: "How much does this cost?", uz: "Bu qancha turadi?" },
            { en: "I would like a cup of coffee.", uz: "Men bir finjon kofe xohlardim." },
            { en: "The weather is beautiful today.", uz: "Bugun ob-havo juda go'zal." },
            { en: "What do you do in your free time?", uz: "Bo'sh vaqtingizda nima qilasiz?" },
            { en: "I speak a little English.", uz: "Men biroz inglizcha gapiraman." },
            { en: "Excuse me, where is the bathroom?", uz: "Kechirasiz, hojatxona qayerda?" },
            { en: "Thank you for your help.", uz: "Yordamingiz uchun rahmat." },
            { en: "I am very busy today.", uz: "Bugun men juda bandman." },
            { en: "Don't worry, everything is fine.", uz: "Xavotir olmang, hammasi joyida." },
            { en: "Where are you from?", uz: "Siz qayerdansiz?" },
            { en: "I am learning how to code.", uz: "Men kod yozishni o'rganyapman." },
            { en: "She is a very good doctor.", uz: "U juda yaxshi shifokor." },
            { en: "We are going to the park.", uz: "Biz parkga ketyapmiz." },
            { en: "Can I ask a question?", uz: "Bitta savol bersam bo'ladimi?" },
            { en: "I forgot my phone at home.", uz: "Telefonimni uyda unutibman." },
            { en: "Practice makes perfect.", uz: "Amaliyot mukammallikka yetaklaydi." }
        ];

        let currentMode = 'words';
        let currentIndex = 0;
        let selectedIndex = null;
        let streak = 1;
        let gems = 100;
        let currentOptions = [];

        function switchMode(mode) {
            playSound('click');
            currentMode = mode;
            currentIndex = 0;

            document.getElementById('mode-words-btn').classList.toggle('active', mode === 'words');
            document.getElementById('mode-sentences-btn').classList.toggle('active', mode === 'sentences');
            
            document.getElementById('section-title').innerText = mode === 'words' ? "So'zlar Bazasidan Mashq" : "Gaplar Bazasidan Mashq";
            document.getElementById('mode-label').innerText = mode === 'words' ? "BO'LIM: SO'ZLAR" : "BO'LIM: GAPLAR";

            loadQuestion();
        }

        function getCurrentList() {
            return currentMode === 'words' ? wordsDatabase : sentencesDatabase;
        }

        function generateOptions(correctAnswer) {
            const list = getCurrentList();
            let options = [correctAnswer];
            
            while (options.length < 4) {
                const randomItem = list[Math.floor(Math.random() * list.length)].uz;
                if (!options.includes(randomItem)) {
                    options.push(randomItem);
                }
            }

            return options.sort(() => Math.random() - 0.5);
        }

        function loadQuestion() {
            const list = getCurrentList();
            const currentItem = list[currentIndex];

            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${list.length}`;
            document.getElementById('question-text').innerText = `"${currentItem.en}"`;
            
            currentOptions = generateOptions(currentItem.uz);
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            selectedIndex = null;
            document.getElementById('check-btn').disabled = true;
            document.getElementById('check-btn').innerText = "TEKSHIRISH";
            document.getElementById('feedback-box').className = "feedback";

            currentOptions.forEach((optText, idx) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerText = optText;
                card.onclick = () => selectOption(idx, card);
                container.appendChild(card);
            });

            speakText(currentItem.en);
        }

        function speakCurrentText() {
            playSound('click');
            const list = getCurrentList();
            speakText(list[currentIndex].en);
        }

        function selectOption(index, element) {
            playSound('click');
            selectedIndex = index;

            document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');

            document.getElementById('check-btn').disabled = false;
        }

        function checkAnswer() {
            const btn = document.getElementById('check-btn');
            const feedback = document.getElementById('feedback-box');
            const list = getCurrentList();

            if (btn.innerText === "DAVOM ETISH") {
                currentIndex = (currentIndex + 1) % list.length;
                loadQuestion();
                return;
            }

            const currentItem = list[currentIndex];

            if (currentOptions[selectedIndex] === currentItem.uz) {
                playSound('correct');
                feedback.innerText = "Barakalla! To'g'ri topdingiz! 🎉";
                feedback.className = "feedback correct";
                
                gems += 15;
                streak += 1;
                document.getElementById('gems').innerText = gems;
                document.getElementById('streak').innerText = streak;
            } else {
                playSound('wrong');
                feedback.innerText = `Noto'g'ri. To'g'ri javob: "${currentItem.uz}"`;
                feedback.className = "feedback wrong";
            }

            btn.innerText = "DAVOM ETISH";
        }

        window.onload = () => {
            loadQuestion();
        };
    </script>
</body>
</html>
